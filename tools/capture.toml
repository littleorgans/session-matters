[tools.session_capture]
cli_name        = "capture"
mcp_description = "Capture tmux pane scrollback for one selected session."
cli_about       = "Capture tmux pane scrollback for one selected session."
mcp_namespace_scope = true
output_schema   = '''
{
  "type": "object",
  "required": ["session", "capture"],
  "properties": {
    "session": {"type": "object"},
    "capture": {
      "type": "object",
      "required": ["status"],
      "properties": {
        "status": {"type": "string", "enum": ["captured", "failed"]},
        "payload": {"type": "object"}
      }
    }
  }
}
'''

[[tools.session_capture.params]]
name            = "id"
type            = "string"
required        = true
mcp_description = "Exact session id to capture."
cli_help        = "Exact session id to capture."
mcp_schema      = '''
{
  "type": "string",
  "format": "uuid"
}
'''

[[tools.session_capture.params]]
name            = "scrollback_lines"
type            = "integer"
required        = false
mcp_description = "Maximum tmux scrollback lines to include. When omitted, runtime-matters uses its default capture depth."
cli_help        = "Maximum tmux scrollback lines to include. When omitted, runtime-matters uses its default capture depth."
cli_flag        = "--scrollback-lines"

[[tools.session_capture.params]]
name            = "json"
type            = "boolean"
required        = false
mcp_description = "Render the captured session and capture result as JSON."
cli_help        = "Render the captured session and capture result as JSON."

[[tools.session_capture.mcp_aliases]]
name            = "agent_capture"
mcp_description = "Deprecated compatibility alias for session_capture. Capture tmux pane scrollback for one selected session."
