# Single source of truth for public session-matters tools.
# crates/sm-cli/build.rs reads this file and generates MCP schema,
# CLI help constants, the Claude Code skill, and README documentation.

[skill]
workflow = """
## Session Control Workflow

Start runtime-matters with `rtm daemon start` before `smd`; session-matters requires runtime-matters protocol 0.6 or newer.
Use `session_run` to run a local session through the session-matters daemon.
Use `session_list` to inspect live and terminated sessions.
Use `session_get` before acting on one session id.
Use `session_capture` to read tmux pane scrollback for a tmux backed session.
Use `session_delete` to terminate daemon owned sessions.
Use `session_label` to add or remove labels on selected sessions.
Use `logs` for daemon-spawned headless transcripts.
Use `wait` and `doctor` for lifecycle and runtime-matters diagnostics.
Use `mail_send`, `mail_check`, and `mail_read` for durable session mail.
Use `nudge` for the ephemeral notification surface.
"""

[tools.session_run]
cli_name        = "run"
mcp_description = "Start a session through the session-matters daemon and rtmd. Supports claude and codex runtimes, headless or tmux targets, docker isolation, image selection, Docker bind mounts, a role, a directory, a namespace, labels, and filesystem agent config resolution. The tool returns the persisted session record."
cli_about       = "Imperatively run a session through the session-matters daemon."
output_schema   = '''
{
  "type": "object",
  "required": ["session"],
  "properties": {
    "session": {
      "type": "object",
      "required": ["id", "runtime", "role", "workspace", "state", "runtime_pid", "created_at", "started_at", "updated_at"],
      "properties": {
        "id": {"type": "string", "format": "uuid"},
        "runtime": {"type": "string", "enum": ["claude", "codex"]},
        "role": {"type": "string"},
        "workspace": {"type": "string"},
        "state": {"type": "string", "enum": ["SPAWNING", "RUNNING", "TERMINATED", "LOST"]},
        "runtime_pid": {"type": "integer"},
        "runtime_session": {"type": ["string", "null"]},
        "transcript_path": {"type": ["string", "null"]},
        "tmux_pane": {"type": ["string", "null"]},
        "agent_config": {"type": ["string", "null"]},
        "labels": {
          "type": "array",
          "items": {
            "type": "object",
            "required": ["key", "value"],
            "properties": {
              "key": {"type": "string"},
              "value": {"type": "string"}
            }
          }
        },
        "created_at": {"type": "string", "format": "date-time"},
        "started_at": {"type": "string", "format": "date-time"},
        "terminated_at": {"type": ["string", "null"], "format": "date-time"},
        "exit_code": {"type": ["integer", "null"]},
        "updated_at": {"type": "string", "format": "date-time"}
      }
    }
  }
}
'''

[[tools.session_run.params]]
name            = "runtime"
type            = "string"
required        = true
enum_values     = ["claude", "codex"]
mcp_description = "Runtime command to launch."
cli_help        = "Runtime to launch."
cli_flag        = "runtime"

[[tools.session_run.params]]
name            = "role"
type            = "string"
required        = true
mcp_description = "Role label recorded on the session."
cli_help        = "Role label recorded on the session."
cli_flag        = "--role"

[[tools.session_run.params]]
name            = "dir"
type            = "string"
required        = true
mcp_description = "Canonical filesystem directory used as the runtime's working directory. The path must be absolute and point to an existing directory."
cli_help        = "Filesystem directory used as the runtime's working directory. Relative paths resolve against the current shell cwd; the path must exist."
cli_flag        = "--dir"

[[tools.session_run.params]]
name            = "namespace"
type            = "string"
required        = false
mcp_description = "Namespace slug for the session. The namespace must already exist before running."
cli_help        = "Namespace slug for the session. Overrides SM_NAMESPACE and the user namespace context."
cli_flag        = "--namespace"

[[tools.session_run.params]]
name            = "labels"
type            = "array"
items_type      = "string"
required        = false
mcp_description = "Optional session labels as key=value strings."
cli_help        = "Session label as key=value."
cli_flag        = "--label"

[[tools.session_run.params]]
name            = "agent_config"
type            = "string"
required        = false
mcp_description = "Agent config name resolved as ~/.agm/<name>/agent.toml, or an explicit agent.toml path."
cli_help        = "Agent config name resolved as `~/.agm/<name>/agent.toml`, or an explicit `agent.toml` path. TOML keys: `claude_config_dir` (string), `[env]` (table of strings)."
cli_flag        = "--agent-config"

[[tools.session_run.params]]
name            = "isolation"
type            = "string"
required        = false
mcp_description = "Runtime isolation policy. Accepted shapes are host, docker, or docker:PROFILE."
cli_help        = "Runtime isolation policy. Accepted shapes are host, docker, or docker:PROFILE."
cli_flag        = "--isolation"

[[tools.session_run.params]]
name            = "image"
type            = "string"
required        = false
mcp_description = "Container image for docker isolated runtimes."
cli_help        = "Container image for docker isolated runtimes."
cli_flag        = "--image"

[[tools.session_run.params]]
name            = "mounts"
type            = "array"
items_type      = "string"
required        = false
mcp_description = "Docker-only bind mounts as HOST:CONTAINER[:ro|:rw]. Repeat to provide multiple mounts. Missing mode defaults to ro."
cli_help        = "Docker-only bind mount as HOST:CONTAINER[:ro|:rw]. Repeat to provide multiple mounts. Missing mode defaults to ro."
cli_flag        = "--mount"

[[tools.session_run.params]]
name            = "target"
type            = "string"
required        = false
mcp_description = "Runtime target. Use headless or tmux:SESSION:WINDOW.PANE. Defaults to headless."
cli_help        = "Runtime target. Use headless or tmux:SESSION:WINDOW.PANE. Defaults to headless."
cli_flag        = "--target"

[[tools.session_run.params]]
name            = "force"
type            = "boolean"
required        = false
mcp_description = "Preempt an occupied tmux pane when the target pane is already owned by another runtime. Other spawn conflicts remain fatal."
cli_help        = "Preempt an occupied tmux pane. Other spawn conflicts remain fatal."
cli_flag        = "--force"

[[tools.session_run.mcp_aliases]]
name            = "agent_run"
mcp_description = "Deprecated compatibility alias for session_run. Start a session through the session-matters daemon and rtmd. Supports claude and codex runtimes, headless or tmux targets, docker isolation, image selection, Docker bind mounts, a role, a directory, a namespace, labels, and filesystem agent config resolution. The tool returns the persisted session record."
