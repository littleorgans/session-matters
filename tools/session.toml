[tools.agent_list]
cli_name        = "get agents"
mcp_description = "Deprecated compatibility alias for session_list. List session records known to the session-matters daemon. The selector grammar is all, id:<uuid>, role:<name>, namespace:<slug>, dir:<path>, label:<key>=<value>, and label:<key> in (a,b)."
cli_about       = "List session records known to the session-matters daemon."
mcp_namespace_scope = true
output_schema   = '''
{
  "type": "object",
  "required": ["sessions"],
  "properties": {
    "sessions": {
      "type": "array",
      "items": {
        "type": "object",
        "required": ["id", "runtime", "role", "workspace", "state", "runtime_pid", "created_at", "started_at", "updated_at"],
        "properties": {
          "id": {"type": "string", "format": "uuid"},
          "runtime": {"type": "string", "enum": ["claude", "codex"]},
          "role": {"type": "string"},
          "workspace": {"type": "string"},
          "state": {"type": "string", "enum": ["SPAWNING", "RUNNING", "TERMINATED", "LOST"]},
          "runtime_pid": {"type": "integer"},
          "runtime_session": {"type": ["string", "null"]},
          "transcript_path": {"type": ["string", "null"]},
          "tmux_pane": {"type": ["string", "null"]},
          "agent_config": {"type": ["string", "null"]},
          "created_at": {"type": "string", "format": "date-time"},
          "started_at": {"type": "string", "format": "date-time"},
          "terminated_at": {"type": ["string", "null"], "format": "date-time"},
          "exit_code": {"type": ["integer", "null"]},
          "updated_at": {"type": "string", "format": "date-time"}
        }
      }
    }
  }
}
'''

[[tools.agent_list.params]]
name            = "selector"
type            = "string"
required        = false
mcp_description = "Optional session selector. Defaults to all."
cli_help        = "Optional session selector."
cli_flag        = "--selector"

[[tools.agent_list.mcp_aliases]]
name            = "session_list"
mcp_description = "List session records known to the session-matters daemon. The selector grammar is all, id:<uuid>, role:<name>, namespace:<slug>, dir:<path>, label:<key>=<value>, and label:<key> in (a,b)."

[tools.agent_get]
cli_name        = "get agent"
mcp_description = "Deprecated compatibility alias for session_get. Get one session record by id. The tool returns an error envelope when the id is unknown."
cli_about       = "Get one session record by id."
mcp_namespace_scope = true
output_schema   = '''
{
  "type": "object",
  "required": ["session"],
  "properties": {
    "session": {
      "type": "object",
      "required": ["id", "runtime", "role", "workspace", "state", "runtime_pid", "created_at", "started_at", "updated_at"],
      "properties": {
        "id": {"type": "string", "format": "uuid"},
        "runtime": {"type": "string", "enum": ["claude", "codex"]},
        "role": {"type": "string"},
        "workspace": {"type": "string"},
        "state": {"type": "string", "enum": ["SPAWNING", "RUNNING", "TERMINATED", "LOST"]},
        "runtime_pid": {"type": "integer"},
        "runtime_session": {"type": ["string", "null"]},
        "transcript_path": {"type": ["string", "null"]},
        "tmux_pane": {"type": ["string", "null"]},
        "agent_config": {"type": ["string", "null"]},
        "created_at": {"type": "string", "format": "date-time"},
        "started_at": {"type": "string", "format": "date-time"},
        "terminated_at": {"type": ["string", "null"], "format": "date-time"},
        "exit_code": {"type": ["integer", "null"]},
        "updated_at": {"type": "string", "format": "date-time"}
      }
    }
  }
}
'''

[[tools.agent_get.params]]
name            = "id"
type            = "string"
required        = true
mcp_description = "Session id to load."
cli_help        = "Session id to load."
cli_flag        = "id"

[[tools.agent_get.mcp_aliases]]
name            = "session_get"
mcp_description = "Get one session record by id. The tool returns an error envelope when the id is unknown."

[tools.agent_delete]
cli_name        = "delete agent"
mcp_description = "Deprecated compatibility alias for session_delete. Terminate daemon owned agent runtimes selected by selector. Defaults to SIGTERM with a five second grace period."
cli_about       = "Terminate daemon owned agent runtimes by selector."
output_schema   = '''
{
  "type": "object",
  "required": ["sessions", "errors"],
  "properties": {
    "sessions": {"type": "array", "items": {"type": "object"}},
    "errors": {"type": "array", "items": {"type": "object"}}
  }
}
'''

[[tools.agent_delete.params]]
name            = "selector"
type            = "string"
required        = true
mcp_description = "Session selector to terminate."
cli_help        = "Session selector to terminate."
cli_flag        = "selector"

[[tools.agent_delete.params]]
name            = "signal"
type            = "string"
required        = false
mcp_description = "Signal to send. Defaults to SIGTERM."
cli_help        = "Signal to send. Defaults to SIGTERM."
cli_flag        = "--signal"

[[tools.agent_delete.params]]
name            = "grace_secs"
type            = "integer"
required        = false
mcp_description = "Seconds to wait before SIGKILL. Defaults to 5."
cli_help        = "Seconds to wait before SIGKILL. Defaults to 5."
cli_flag        = "--grace"

[[tools.agent_delete.mcp_aliases]]
name            = "session_delete"
mcp_description = "Terminate daemon owned sessions selected by selector. Defaults to SIGTERM with a five second grace period."

