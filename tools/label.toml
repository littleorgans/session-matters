[tools.session_label]
cli_name        = "label"
mcp_description = "Add or remove one label on sessions selected by selector. Mutations use key=value to set and key- to remove."
cli_about       = "Add or remove labels on selected sessions."
output_schema   = '''
{
  "type": "object",
  "required": ["sessions", "errors"],
  "properties": {
    "sessions": {"type": "array", "items": {"type": "object"}},
    "errors": {"type": "array", "items": {"type": "object"}}
  }
}
'''

[[tools.session_label.params]]
name            = "selector"
type            = "string"
required        = true
mcp_description = "Session selector used for matching sessions to label."
cli_help        = "Session selector used for matching sessions to label."
cli_flag        = "selector"
selector        = true

[[tools.session_label.params]]
name            = "mutation"
type            = "string"
required        = true
mcp_description = "Label mutation as key=value or key-."
cli_help        = "Label mutation as key=value or key-."
cli_flag        = "mutation"

[[tools.session_label.mcp_aliases]]
name            = "agent_label"
mcp_description = "Deprecated compatibility alias for session_label. Add or remove one label on sessions selected by selector. Mutations use key=value to set and key- to remove."
