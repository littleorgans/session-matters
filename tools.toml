# Single source of truth for public session-matters tools.
# crates/sm-cli/build.rs reads this file and generates MCP schema,
# CLI help constants, the Claude Code skill, and README documentation.

[skill]
workflow = """
## Session Control Workflow

Use `agent_run` to start a local agent runtime through the session-matters daemon.
Use `agent_list` to inspect live and terminated sessions.
Use `agent_get` before acting on one session id.
Use `agent_capture` to read tmux pane scrollback for a tmux backed session.
Use `agent_delete` to terminate daemon owned sessions.
Use `agent_label` to add or remove labels on selected sessions.
Use `link`, `logs`, `wait`, and `doctor` for runtime linkback and diagnostics.
Use `mail_send`, `mail_check`, and `mail_read` for durable session mail.
Use `nudge` for the ephemeral notification surface.
"""

[tools.agent_run]
cli_name        = "run"
mcp_description = "Start an agent runtime through the session-matters daemon. This v1 pass supports claude and codex runtimes, a role, a workspace, labels, and filesystem agent config resolution. The tool returns the persisted session record."
cli_about       = "Start an agent runtime through the session-matters daemon."
output_schema   = '''
{
  "type": "object",
  "required": ["session"],
  "properties": {
    "session": {
      "type": "object",
      "required": ["id", "runtime", "role", "workspace", "state", "runtime_pid", "created_at", "started_at", "updated_at"],
      "properties": {
        "id": {"type": "string", "format": "uuid"},
        "runtime": {"type": "string", "enum": ["claude", "codex"]},
        "role": {"type": "string"},
        "workspace": {"type": "string"},
        "state": {"type": "string", "enum": ["SPAWNING", "RUNNING", "TERMINATED", "LOST"]},
        "runtime_pid": {"type": "integer"},
        "runtime_session": {"type": ["string", "null"]},
        "transcript_path": {"type": ["string", "null"]},
        "tmux_pane": {"type": ["string", "null"]},
        "agent_config": {"type": ["string", "null"]},
        "created_at": {"type": "string", "format": "date-time"},
        "started_at": {"type": "string", "format": "date-time"},
        "terminated_at": {"type": ["string", "null"], "format": "date-time"},
        "exit_code": {"type": ["integer", "null"]},
        "updated_at": {"type": "string", "format": "date-time"}
      }
    }
  }
}
'''

[[tools.agent_run.params]]
name            = "runtime"
type            = "string"
required        = true
enum_values     = ["claude", "codex"]
mcp_description = "Runtime command to launch."
cli_help        = "Runtime to launch."
cli_flag        = "runtime"

[[tools.agent_run.params]]
name            = "role"
type            = "string"
required        = true
mcp_description = "Role label recorded on the session."
cli_help        = "Role label recorded on the session."
cli_flag        = "--role"

[[tools.agent_run.params]]
name            = "workspace"
type            = "string"
required        = true
mcp_description = "Workspace path or name recorded on the session."
cli_help        = "Workspace path or name recorded on the session."
cli_flag        = "--workspace"

[[tools.agent_run.params]]
name            = "labels"
type            = "array"
items_type      = "string"
required        = false
mcp_description = "Optional session labels as key=value strings."
cli_help        = "Session label as key=value."
cli_flag        = "--label"

[[tools.agent_run.params]]
name            = "agent_config"
type            = "string"
required        = false
mcp_description = "Agent config name resolved as ~/.agm/<name>/agent.toml, or an explicit agent.toml path."
cli_help        = "Agent config name or explicit agent.toml path."
cli_flag        = "--agent-config"

[[tools.agent_run.params]]
name            = "target"
type            = "string"
required        = false
mcp_description = "Runtime target. Use headless or tmux:SESSION:WINDOW.PANE. Defaults to headless."
cli_help        = "Runtime target. Use headless or tmux:SESSION:WINDOW.PANE. Defaults to headless."
cli_flag        = "--target"

[tools.agent_list]
cli_name        = "get agents"
mcp_description = "List session records known to the session-matters daemon. The selector grammar is all, id:<uuid>, role:<name>, workspace:<name>, label:<key>=<value>, and label:<key> in (a,b)."
cli_about       = "List session records known to the session-matters daemon."
output_schema   = '''
{
  "type": "object",
  "required": ["sessions"],
  "properties": {
    "sessions": {
      "type": "array",
      "items": {
        "type": "object",
        "required": ["id", "runtime", "role", "workspace", "state", "runtime_pid", "created_at", "started_at", "updated_at"],
        "properties": {
          "id": {"type": "string", "format": "uuid"},
          "runtime": {"type": "string", "enum": ["claude", "codex"]},
          "role": {"type": "string"},
          "workspace": {"type": "string"},
          "state": {"type": "string", "enum": ["SPAWNING", "RUNNING", "TERMINATED", "LOST"]},
          "runtime_pid": {"type": "integer"},
          "runtime_session": {"type": ["string", "null"]},
          "transcript_path": {"type": ["string", "null"]},
          "tmux_pane": {"type": ["string", "null"]},
          "agent_config": {"type": ["string", "null"]},
          "created_at": {"type": "string", "format": "date-time"},
          "started_at": {"type": "string", "format": "date-time"},
          "terminated_at": {"type": ["string", "null"], "format": "date-time"},
          "exit_code": {"type": ["integer", "null"]},
          "updated_at": {"type": "string", "format": "date-time"}
        }
      }
    }
  }
}
'''

[[tools.agent_list.params]]
name            = "selector"
type            = "string"
required        = false
mcp_description = "Optional session selector. Defaults to all."
cli_help        = "Optional session selector."
cli_flag        = "--selector"

[tools.agent_get]
cli_name        = "get agent"
mcp_description = "Get one session record by id. The tool returns an error envelope when the id is unknown."
cli_about       = "Get one session record by id."
output_schema   = '''
{
  "type": "object",
  "required": ["session"],
  "properties": {
    "session": {
      "type": "object",
      "required": ["id", "runtime", "role", "workspace", "state", "runtime_pid", "created_at", "started_at", "updated_at"],
      "properties": {
        "id": {"type": "string", "format": "uuid"},
        "runtime": {"type": "string", "enum": ["claude", "codex"]},
        "role": {"type": "string"},
        "workspace": {"type": "string"},
        "state": {"type": "string", "enum": ["SPAWNING", "RUNNING", "TERMINATED", "LOST"]},
        "runtime_pid": {"type": "integer"},
        "runtime_session": {"type": ["string", "null"]},
        "transcript_path": {"type": ["string", "null"]},
        "tmux_pane": {"type": ["string", "null"]},
        "agent_config": {"type": ["string", "null"]},
        "created_at": {"type": "string", "format": "date-time"},
        "started_at": {"type": "string", "format": "date-time"},
        "terminated_at": {"type": ["string", "null"], "format": "date-time"},
        "exit_code": {"type": ["integer", "null"]},
        "updated_at": {"type": "string", "format": "date-time"}
      }
    }
  }
}
'''

[[tools.agent_get.params]]
name            = "id"
type            = "string"
required        = true
mcp_description = "Session id to load."
cli_help        = "Session id to load."
cli_flag        = "id"

[tools.agent_capture]
cli_name        = "capture"
mcp_description = "Capture tmux pane scrollback for one selected session."
cli_about       = "Capture tmux pane scrollback for one selected session."
output_schema   = '''
{
  "type": "object",
  "required": ["session", "capture"],
  "properties": {
    "session": {"type": "object"},
    "capture": {
      "type": "object",
      "required": ["status"],
      "properties": {
        "status": {"type": "string", "enum": ["captured", "failed"]},
        "payload": {"type": "object"}
      }
    }
  }
}
'''

[[tools.agent_capture.params]]
name            = "selector"
type            = "string"
required        = true
mcp_description = "Session selector to capture. Usually id:<uuid>."
cli_help        = "Session selector to capture. Usually id:<uuid>."
cli_flag        = "--selector"

[[tools.agent_capture.params]]
name            = "scrollback_lines"
type            = "integer"
required        = false
mcp_description = "Maximum tmux scrollback lines to include."
cli_help        = "Maximum tmux scrollback lines to include."
cli_flag        = "--scrollback-lines"

[tools.agent_delete]
cli_name        = "delete agent"
mcp_description = "Terminate daemon owned agent runtimes selected by selector. Defaults to SIGTERM with a five second grace period."
cli_about       = "Terminate daemon owned agent runtimes by selector."
output_schema   = '''
{
  "type": "object",
  "required": ["sessions", "errors"],
  "properties": {
    "sessions": {"type": "array", "items": {"type": "object"}},
    "errors": {"type": "array", "items": {"type": "object"}}
  }
}
'''

[[tools.agent_delete.params]]
name            = "selector"
type            = "string"
required        = true
mcp_description = "Session selector to terminate."
cli_help        = "Session selector to terminate."
cli_flag        = "selector"

[[tools.agent_delete.params]]
name            = "signal"
type            = "string"
required        = false
mcp_description = "Signal to send. Defaults to SIGTERM."
cli_help        = "Signal to send. Defaults to SIGTERM."
cli_flag        = "--signal"

[[tools.agent_delete.params]]
name            = "grace_secs"
type            = "integer"
required        = false
mcp_description = "Seconds to wait before SIGKILL. Defaults to 5."
cli_help        = "Seconds to wait before SIGKILL. Defaults to 5."
cli_flag        = "--grace"

[tools.agent_label]
cli_name        = "label"
mcp_description = "Add or remove one label on sessions selected by selector. Mutations use key=value to set and key- to remove."
cli_about       = "Add or remove labels on selected sessions."
output_schema   = '''
{
  "type": "object",
  "required": ["sessions", "errors"],
  "properties": {
    "sessions": {"type": "array", "items": {"type": "object"}},
    "errors": {"type": "array", "items": {"type": "object"}}
  }
}
'''

[[tools.agent_label.params]]
name            = "selector"
type            = "string"
required        = true
mcp_description = "Session selector to mutate."
cli_help        = "Session selector to mutate."
cli_flag        = "selector"

[[tools.agent_label.params]]
name            = "mutation"
type            = "string"
required        = true
mcp_description = "Label mutation as key=value or key-."
cli_help        = "Label mutation as key=value or key-."
cli_flag        = "mutation"

[tools.mail_send]
cli_name        = "mail send"
mcp_description = "Send durable mail to sessions selected by selector."
cli_about       = "Send durable mail to selected sessions."
output_schema   = '''
{
  "type": "object",
  "required": ["mail"],
  "properties": {
    "mail": {"type": "array", "items": {"type": "object"}},
    "errors": {"type": "array", "items": {"type": "object"}}
  }
}
'''

[[tools.mail_send.params]]
name            = "to"
type            = "string"
required        = true
mcp_description = "Recipient selector."
cli_help        = "Recipient selector."
cli_flag        = "--to"

[[tools.mail_send.params]]
name            = "from"
type            = "string"
required        = false
mcp_description = "Sender session id. Defaults to HELIOY_SESSION_ID when set; otherwise smd records the controller sender."
cli_help        = "Sender session id. Defaults to HELIOY_SESSION_ID when set."
cli_flag        = "--from"

[[tools.mail_send.params]]
name            = "content"
type            = "string"
required        = true
mcp_description = "Message content."
cli_help        = "Message content."
cli_flag        = "--content"

[tools.mail_read]
cli_name        = "mail read"
mcp_description = "Read unread mail for sessions selected by selector. Reads mark messages read unless peek is true."
cli_about       = "Read unread mail for selected sessions."
output_schema   = '''
{
  "type": "object",
  "required": ["mail"],
  "properties": {
    "mail": {"type": "array", "items": {"type": "object"}},
    "errors": {"type": "array", "items": {"type": "object"}}
  }
}
'''

[[tools.mail_read.params]]
name            = "selector"
type            = "string"
required        = true
mcp_description = "Inbox owner selector."
cli_help        = "Inbox owner selector."
cli_flag        = "--selector"

[[tools.mail_read.params]]
name            = "peek"
type            = "boolean"
required        = false
mcp_description = "Return unread mail without marking it read."
cli_help        = "Return unread mail without marking it read."
cli_flag        = "--peek"

[tools.mail_check]
cli_name        = "mail check"
mcp_description = "Return the unread mail count for sessions selected by selector without draining mail."
cli_about       = "Return unread mail count for selected sessions."
output_schema   = '''
{
  "type": "object",
  "required": ["unread"],
  "properties": {
    "unread": {"type": "integer"},
    "counts": {"type": "array", "items": {"type": "object"}}
  }
}
'''

[[tools.mail_check.params]]
name            = "selector"
type            = "string"
required        = true
mcp_description = "Inbox owner selector."
cli_help        = "Inbox owner selector."
cli_flag        = "--selector"

[tools.mail_stop_check]
cli_name        = "mail stop-check"
mcp_description = "Return the unread mail count for stop-hook decisions without draining mail."
cli_about       = "Check unread mail for stop-hook decisions."
output_schema   = '''
{
  "type": "object",
  "required": ["unread"],
  "properties": {
    "unread": {"type": "integer"},
    "counts": {"type": "array", "items": {"type": "object"}}
  }
}
'''

[[tools.mail_stop_check.params]]
name            = "selector"
type            = "string"
required        = true
mcp_description = "Inbox owner selector."
cli_help        = "Inbox owner selector."
cli_flag        = "--selector"

[tools.nudge]
cli_name        = "nudge"
mcp_description = "Send an ephemeral nudge to sessions selected by selector. Tmux-backed runtimes deliver through rtmd; headless or ended runtimes return typed failure messages."
cli_about       = "Send an ephemeral nudge to selected sessions."
output_schema   = '''
{
  "type": "object",
  "required": ["nudges", "errors"],
  "properties": {
    "nudges": {"type": "array", "items": {"type": "object"}},
    "errors": {"type": "array", "items": {"type": "object"}}
  }
}
'''

[[tools.nudge.params]]
name            = "to"
type            = "string"
required        = true
mcp_description = "Recipient selector."
cli_help        = "Recipient selector."
cli_flag        = "--to"

[[tools.nudge.params]]
name            = "content"
type            = "string"
required        = true
mcp_description = "Nudge content."
cli_help        = "Nudge content."
cli_flag        = "--content"

[tools.link]
cli_name        = "link"
mcp_description = "Attach runtime metadata to one unmanaged session. Daemon-spawned headless sessions link stdout logs automatically."
cli_about       = "Attach runtime metadata to one unmanaged session."
output_schema   = '''
{
  "type": "object",
  "required": ["session"],
  "properties": {
    "session": {"type": "object"}
  }
}
'''

[[tools.link.params]]
name            = "session_id"
type            = "string"
required        = false
mcp_description = "Session id to link. CLI defaults to HELIOY_SESSION_ID when omitted."
cli_help        = "Session id to link. Defaults to HELIOY_SESSION_ID."
cli_flag        = "--session-id"

[[tools.link.params]]
name            = "selector"
type            = "string"
required        = false
mcp_description = "Selector that must match exactly one session when session_id is omitted."
cli_help        = "Selector that must match exactly one session."
cli_flag        = "--selector"

[[tools.link.params]]
name            = "runtime_session"
type            = "string"
required        = true
mcp_description = "Runtime session id reported by the SessionStart hook."
cli_help        = "Runtime session id reported by the SessionStart hook."
cli_flag        = "--runtime-session"

[[tools.link.params]]
name            = "transcript"
type            = "string"
required        = true
mcp_description = "Transcript path reported by the SessionStart hook."
cli_help        = "Transcript path reported by the SessionStart hook."
cli_flag        = "--transcript"

[tools.logs]
cli_name        = "logs"
mcp_description = "Read the transcript linked to one selected session."
cli_about       = "Read linked transcript logs for one session."
output_schema   = '''
{
  "type": "object",
  "required": ["session", "transcript_path", "content"],
  "properties": {
    "session": {"type": "object"},
    "transcript_path": {"type": "string"},
    "content": {"type": "string"}
  }
}
'''

[[tools.logs.params]]
name            = "selector"
type            = "string"
required        = true
mcp_description = "Selector that must match exactly one session with transcript logs."
cli_help        = "Selector that must match exactly one session with transcript logs."
cli_flag        = "selector"

[[tools.logs.params]]
name            = "follow"
type            = "boolean"
required        = false
mcp_description = "CLI only: follow appended transcript bytes."
cli_help        = "Follow appended transcript bytes."
cli_flag        = "--follow"

[[tools.logs.params]]
name            = "max_bytes"
type            = "integer"
required        = false
mcp_description = "Maximum bytes to return from the end of the transcript."
cli_help        = "Maximum bytes to return from the end of the transcript."
cli_flag        = "--max-bytes"

[tools.wait]
cli_name        = "wait"
mcp_description = "Wait until a selector satisfies running, terminated, or count=N."
cli_about       = "Wait until a selector satisfies a condition."
output_schema   = '''
{
  "type": "object",
  "required": ["matched", "sessions"],
  "properties": {
    "matched": {"type": "boolean"},
    "sessions": {"type": "array", "items": {"type": "object"}}
  }
}
'''

[[tools.wait.params]]
name            = "selector"
type            = "string"
required        = true
mcp_description = "Session selector to observe."
cli_help        = "Session selector to observe."
cli_flag        = "selector"

[[tools.wait.params]]
name            = "for"
type            = "string"
required        = true
mcp_description = "Condition to wait for: running, terminated, or count=N."
cli_help        = "Condition to wait for: running, terminated, or count=N."
cli_flag        = "--for"

[[tools.wait.params]]
name            = "timeout_secs"
type            = "integer"
required        = false
mcp_description = "Seconds to wait before timing out. Defaults to 30."
cli_help        = "Seconds to wait before timing out. Defaults to 30."
cli_flag        = "--timeout"

[tools.doctor]
cli_name        = "doctor"
mcp_description = "Report session-matters daemon health, LOST sessions, and v1 runtime driver status."
cli_about       = "Report session-matters daemon health."
output_schema   = '''
{
  "type": "object",
  "required": ["status", "runtime", "findings"],
  "properties": {
    "status": {"type": "string"},
    "runtime": {"type": "string"},
    "findings": {"type": "array", "items": {"type": "object"}}
  }
}
'''
