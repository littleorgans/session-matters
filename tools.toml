# Single source of truth for public session-matters tools.
# crates/sm-cli/build.rs reads this file and generates MCP schema,
# CLI help constants, the Claude Code skill, and README documentation.

[skill]
workflow = """
## Session Control Workflow

Use `agent_run` to start a local agent runtime through the session-matters daemon.
Use `agent_list` to inspect live and terminated sessions.
Use `agent_get` before acting on one session id.
Use `agent_delete` to terminate daemon owned sessions.
Use `mail_send`, `mail_check`, and `mail_read` for durable session mail.
Use `nudge` for the ephemeral notification surface.
"""

[tools.agent_run]
cli_name        = "run"
mcp_description = "Start an agent runtime through the session-matters daemon. This v1 pass supports claude and codex runtimes, a role, and a workspace. The tool returns the persisted session record."
cli_about       = "Start an agent runtime through the session-matters daemon."
output_schema   = '''
{
  "type": "object",
  "required": ["session"],
  "properties": {
    "session": {
      "type": "object",
      "required": ["id", "runtime", "role", "workspace", "state", "runtime_pid", "created_at", "started_at", "updated_at"],
      "properties": {
        "id": {"type": "string", "format": "uuid"},
        "runtime": {"type": "string", "enum": ["claude", "codex"]},
        "role": {"type": "string"},
        "workspace": {"type": "string"},
        "state": {"type": "string", "enum": ["SPAWNING", "RUNNING", "TERMINATED"]},
        "runtime_pid": {"type": "integer"},
        "created_at": {"type": "string", "format": "date-time"},
        "started_at": {"type": "string", "format": "date-time"},
        "terminated_at": {"type": ["string", "null"], "format": "date-time"},
        "exit_code": {"type": ["integer", "null"]},
        "updated_at": {"type": "string", "format": "date-time"}
      }
    }
  }
}
'''

[[tools.agent_run.params]]
name            = "runtime"
type            = "string"
required        = true
enum_values     = ["claude", "codex"]
mcp_description = "Runtime command to launch."
cli_help        = "Runtime to launch."
cli_flag        = "runtime"

[[tools.agent_run.params]]
name            = "role"
type            = "string"
required        = true
mcp_description = "Role label recorded on the session."
cli_help        = "Role label recorded on the session."
cli_flag        = "--role"

[[tools.agent_run.params]]
name            = "workspace"
type            = "string"
required        = true
mcp_description = "Workspace path or name recorded on the session."
cli_help        = "Workspace path or name recorded on the session."
cli_flag        = "--workspace"

[tools.agent_list]
cli_name        = "get agents"
mcp_description = "List session records known to the session-matters daemon. Pass an id only when a narrow list response is useful; use agent_get when exactly one session is required."
cli_about       = "List session records known to the session-matters daemon."
output_schema   = '''
{
  "type": "object",
  "required": ["sessions"],
  "properties": {
    "sessions": {
      "type": "array",
      "items": {
        "type": "object",
        "required": ["id", "runtime", "role", "workspace", "state", "runtime_pid", "created_at", "started_at", "updated_at"],
        "properties": {
          "id": {"type": "string", "format": "uuid"},
          "runtime": {"type": "string", "enum": ["claude", "codex"]},
          "role": {"type": "string"},
          "workspace": {"type": "string"},
          "state": {"type": "string", "enum": ["SPAWNING", "RUNNING", "TERMINATED"]},
          "runtime_pid": {"type": "integer"},
          "created_at": {"type": "string", "format": "date-time"},
          "started_at": {"type": "string", "format": "date-time"},
          "terminated_at": {"type": ["string", "null"], "format": "date-time"},
          "exit_code": {"type": ["integer", "null"]},
          "updated_at": {"type": "string", "format": "date-time"}
        }
      }
    }
  }
}
'''

[[tools.agent_list.params]]
name            = "id"
type            = "string"
required        = false
mcp_description = "Optional session id filter."
cli_help        = "Optional session id filter."
cli_flag        = "--id"

[tools.agent_get]
cli_name        = "get agent"
mcp_description = "Get one session record by id. The tool returns an error envelope when the id is unknown."
cli_about       = "Get one session record by id."
output_schema   = '''
{
  "type": "object",
  "required": ["session"],
  "properties": {
    "session": {
      "type": "object",
      "required": ["id", "runtime", "role", "workspace", "state", "runtime_pid", "created_at", "started_at", "updated_at"],
      "properties": {
        "id": {"type": "string", "format": "uuid"},
        "runtime": {"type": "string", "enum": ["claude", "codex"]},
        "role": {"type": "string"},
        "workspace": {"type": "string"},
        "state": {"type": "string", "enum": ["SPAWNING", "RUNNING", "TERMINATED"]},
        "runtime_pid": {"type": "integer"},
        "created_at": {"type": "string", "format": "date-time"},
        "started_at": {"type": "string", "format": "date-time"},
        "terminated_at": {"type": ["string", "null"], "format": "date-time"},
        "exit_code": {"type": ["integer", "null"]},
        "updated_at": {"type": "string", "format": "date-time"}
      }
    }
  }
}
'''

[[tools.agent_get.params]]
name            = "id"
type            = "string"
required        = true
mcp_description = "Session id to load."
cli_help        = "Session id to load."
cli_flag        = "id"

[tools.agent_delete]
cli_name        = "delete agent"
mcp_description = "Terminate one daemon owned agent runtime by id and return the updated session record. Defaults to SIGTERM with a five second grace period."
cli_about       = "Terminate one daemon owned agent runtime by id."
output_schema   = '''
{
  "type": "object",
  "required": ["session"],
  "properties": {
    "session": {
      "type": "object",
      "required": ["id", "runtime", "role", "workspace", "state", "runtime_pid", "created_at", "started_at", "terminated_at", "updated_at"],
      "properties": {
        "id": {"type": "string", "format": "uuid"},
        "runtime": {"type": "string", "enum": ["claude", "codex"]},
        "role": {"type": "string"},
        "workspace": {"type": "string"},
        "state": {"type": "string", "enum": ["SPAWNING", "RUNNING", "TERMINATED"]},
        "runtime_pid": {"type": "integer"},
        "created_at": {"type": "string", "format": "date-time"},
        "started_at": {"type": "string", "format": "date-time"},
        "terminated_at": {"type": ["string", "null"], "format": "date-time"},
        "exit_code": {"type": ["integer", "null"]},
        "updated_at": {"type": "string", "format": "date-time"}
      }
    }
  }
}
'''

[[tools.agent_delete.params]]
name            = "id"
type            = "string"
required        = true
mcp_description = "Session id to terminate."
cli_help        = "Session id to terminate."
cli_flag        = "id"

[[tools.agent_delete.params]]
name            = "signal"
type            = "string"
required        = false
mcp_description = "Signal to send. Defaults to SIGTERM."
cli_help        = "Signal to send. Defaults to SIGTERM."
cli_flag        = "--signal"

[[tools.agent_delete.params]]
name            = "grace_secs"
type            = "integer"
required        = false
mcp_description = "Seconds to wait before SIGKILL. Defaults to 5."
cli_help        = "Seconds to wait before SIGKILL. Defaults to 5."
cli_flag        = "--grace"

[tools.mail_send]
cli_name        = "mail send"
mcp_description = "Send durable mail to one session id. Selector addressing lands in a later pass."
cli_about       = "Send durable mail to one session id."
output_schema   = '''
{
  "type": "object",
  "required": ["mail"],
  "properties": {
    "mail": {
      "type": "object",
      "required": ["id", "sender_id", "recipient_id", "content", "sent_at"],
      "properties": {
        "id": {"type": "string", "format": "uuid"},
        "sender_id": {"type": "string", "format": "uuid"},
        "recipient_id": {"type": "string", "format": "uuid"},
        "content": {"type": "string"},
        "sent_at": {"type": "string", "format": "date-time"},
        "read_at": {"type": ["string", "null"], "format": "date-time"}
      }
    }
  }
}
'''

[[tools.mail_send.params]]
name            = "to"
type            = "string"
required        = true
mcp_description = "Recipient session id."
cli_help        = "Recipient session id."
cli_flag        = "--to"

[[tools.mail_send.params]]
name            = "from"
type            = "string"
required        = false
mcp_description = "Sender session id. Defaults to HELIOY_SESSION_ID when set; otherwise smd records the controller sender."
cli_help        = "Sender session id. Defaults to HELIOY_SESSION_ID when set."
cli_flag        = "--from"

[[tools.mail_send.params]]
name            = "content"
type            = "string"
required        = true
mcp_description = "Message content."
cli_help        = "Message content."
cli_flag        = "--content"

[tools.mail_read]
cli_name        = "mail read"
mcp_description = "Read unread mail for one session id. Reads mark messages read unless peek is true."
cli_about       = "Read unread mail for one session id."
output_schema   = '''
{
  "type": "object",
  "required": ["mail"],
  "properties": {
    "mail": {
      "type": "array",
      "items": {
        "type": "object",
        "required": ["id", "sender_id", "recipient_id", "content", "sent_at"],
        "properties": {
          "id": {"type": "string", "format": "uuid"},
          "sender_id": {"type": "string", "format": "uuid"},
          "recipient_id": {"type": "string", "format": "uuid"},
          "content": {"type": "string"},
          "sent_at": {"type": "string", "format": "date-time"},
          "read_at": {"type": ["string", "null"], "format": "date-time"}
        }
      }
    }
  }
}
'''

[[tools.mail_read.params]]
name            = "from"
type            = "string"
required        = true
mcp_description = "Inbox owner session id."
cli_help        = "Inbox owner session id."
cli_flag        = "--from"

[[tools.mail_read.params]]
name            = "peek"
type            = "boolean"
required        = false
mcp_description = "Return unread mail without marking it read."
cli_help        = "Return unread mail without marking it read."
cli_flag        = "--peek"

[tools.mail_check]
cli_name        = "mail check"
mcp_description = "Return the unread mail count for one session id without draining mail."
cli_about       = "Return unread mail count for one session id."
output_schema   = '''
{
  "type": "object",
  "required": ["unread"],
  "properties": {
    "unread": {"type": "integer"}
  }
}
'''

[[tools.mail_check.params]]
name            = "from"
type            = "string"
required        = true
mcp_description = "Inbox owner session id."
cli_help        = "Inbox owner session id."
cli_flag        = "--from"

[tools.mail_stop_check]
cli_name        = "mail stop-check"
mcp_description = "Return the unread mail count for stop-hook decisions without draining mail."
cli_about       = "Check unread mail for stop-hook decisions."
output_schema   = '''
{
  "type": "object",
  "required": ["unread"],
  "properties": {
    "unread": {"type": "integer"}
  }
}
'''

[[tools.mail_stop_check.params]]
name            = "from"
type            = "string"
required        = true
mcp_description = "Inbox owner session id."
cli_help        = "Inbox owner session id."
cli_flag        = "--from"

[tools.nudge]
cli_name        = "nudge"
mcp_description = "Send an ephemeral nudge to one session id. The v1 in-process driver logs that the tmux gateway is unavailable and does not deliver."
cli_about       = "Send an ephemeral nudge to one session id."
output_schema   = '''
{
  "type": "object",
  "required": ["to", "delivered", "message"],
  "properties": {
    "to": {"type": "string", "format": "uuid"},
    "delivered": {"type": "boolean"},
    "message": {"type": "string"}
  }
}
'''

[[tools.nudge.params]]
name            = "to"
type            = "string"
required        = true
mcp_description = "Recipient session id."
cli_help        = "Recipient session id."
cli_flag        = "--to"

[[tools.nudge.params]]
name            = "content"
type            = "string"
required        = true
mcp_description = "Nudge content."
cli_help        = "Nudge content."
cli_flag        = "--content"
