name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - uses: taiki-e/install-action@just

      - uses: taiki-e/install-action@nextest

      - name: Install runtime-matters
        run: |
          curl --proto '=https' --tlsv1.2 -LsSf https://github.com/littleorgans/runtime-matters/releases/download/v0.2.1/rtm-cli-installer.sh | sh
          rtm --version

      - name: Check
        run: just check

      - name: Build
        run: just build

      - name: Test
        run: just test --profile ci

      - name: Doctest
        run: just test-doc

      - name: Generated README parity
        run: git diff --exit-code README.md
