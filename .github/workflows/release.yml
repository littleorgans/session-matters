name: Release

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to build
        required: true

permissions:
  contents: write
  id-token: write
  attestations: write

env:
  CARGO_TERM_COLOR: always
  CARGO_DIST_VERSION: 0.31.0

jobs:
  dist:
    name: cargo-dist (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-dist
        shell: bash
        run: |
          curl --proto '=https' --tlsv1.2 -LsSf \
            "https://github.com/axodotdev/cargo-dist/releases/download/v${CARGO_DIST_VERSION}/cargo-dist-installer.sh" \
            | sh

      - name: Build artifacts
        shell: bash
        run: cargo dist build --target "${{ matrix.target }}" --output-format=json

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: session-matters-${{ matrix.target }}
          path: target/distrib/*
          if-no-files-found: error

  publish:
    name: Publish artifacts
    runs-on: ubuntu-latest
    needs: dist
    if: github.event_name == 'release'

    steps:
      - uses: actions/download-artifact@v6
        with:
          path: artifacts
          merge-multiple: true

      - name: Upload artifacts to release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: gh release upload "$TAG_NAME" artifacts/* --repo "${{ github.repository }}" --clobber
